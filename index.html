<!DOCTYPE html>
<html>
<head>
  <title>Special Delivery 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9ec4, #ffc0cb, #ffb6c1);
      font-family: "Comic Sans MS", cursive, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      position: relative;
    }

    /* Devii pop & stay */
    h1 {
      font-size: 60px;
      margin-bottom: 20px;
      opacity: 0;
      animation: popBlast 1s ease forwards;
    }

    @keyframes popBlast {
      0% { transform: scale(0.1) rotate(-30deg); opacity: 0; }
      50% { transform: scale(2) rotate(15deg); opacity: 1; }
      70% { transform: scale(1.2) rotate(-5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .text-line {
      opacity: 0;
      display: inline-block;
      margin: 5px 0;
      animation: slideIn 1s ease forwards;
    }

    .text-line:nth-child(1) { animation-delay: 1s; }
    .text-line:nth-child(2) { animation-delay: 1.3s; }
    .text-line:nth-child(3) { animation-delay: 1.6s; }

    @keyframes slideIn {
      0% { transform: translateX(-50px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    .float-all { animation: floatAll 3s ease-in-out infinite; }

    @keyframes floatAll {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .emoji {
      font-size: 28px;
      position: absolute;
      animation: floatEmojis linear infinite;
    }

    @keyframes floatEmojis {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-50vh) rotate(360deg); opacity: 0; }
    }

    /* Big visible tap button */
    #play-button {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff69b4;
      color: white;
      font-size: 28px;
      font-weight: bold;
      padding: 25px 50px;
      border-radius: 40px;
      border: 2px solid white;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }

  </style>
</head>
<body>

<h1 id="devii">Deviiiii ✋🎀</h1>

<div id="text-lines">
  <p class="text-line">Enjoy your food....</p>
  <br>
  <p class="text-line">Eat properly okayyy!!!! </p>
  <br>
  <p class="text-line">And don't forget to send me the empty box picture 😏📸</p>
</div>

<!-- Big Tap to Play button -->
<div id="play-button">🔊 Tap to Play Music!</div>

<!-- Audio -->
<audio id="bg-audio" loop>
  <source src="https://raw.githubusercontent.com/Abiii1401/food-del/main/Thangapoovey.mp3" type="audio/mpeg" />
</audio>

<script>
  // Floating emojis
  const emojiList = ["🌸","🎀","✨","🥺","🍓","🧁","🐻","🍛","🍜"];
  const totalEmojis = 50;
  for(let i=0;i<totalEmojis;i++){
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");
    emoji.innerText = emojiList[Math.floor(Math.random()*emojiList.length)];
    emoji.style.left = Math.random()*100 + "vw";
    emoji.style.fontSize = 10 + Math.random()*30 + "px";
    emoji.style.animationDuration = 5 + Math.random()*10 + "s";
    emoji.style.animationDelay = Math.random()*5 + "s";
    document.body.appendChild(emoji);
  }

  // Float text after animation
  setTimeout(()=>{
    document.getElementById("text-lines").classList.add("float-all");
  },3000);

  // Play button logic
  const audio = document.getElementById("bg-audio");
  const playButton = document.getElementById("play-button");
  playButton.addEventListener("click", ()=>{
    audio.volume = 1.0; // set max volume
    audio.play();
    playButton.style.display = "none"; // hide button after tap
  });
</script>

</body>
</html>
